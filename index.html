<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kaizen Report Form</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f3f6fb;
    margin: 0;
    padding: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

td, th {
    border: 1px solid #e6e6e6;
    padding: 8px;
    font-size: 13px;
}

.header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    font-size: 20px;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.green-header {
    background: #2ecc71;
    color: white;
    font-weight: bold;
    text-align: center;
}

.blue-header {
    background: #3498db;
    color: white;
    font-weight: bold;
    text-align: center;
}

.section-title {
    background: #f1f1f1;
    font-weight: bold;
    text-align: center;
}

input, select, textarea {
    width: 100%;
    padding: 6px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 13px;
}

textarea {
    min-height: 80px;
}

button {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 15px;
}
</style>

</head>
<body>

<form onsubmit="submitForm(event)">

<table>

<tr>
<td colspan="8" class="header">KAIZEN REPORT FORM</td>
</tr>

<tr>
<td colspan="8" class="green-header">General Information</td>
</tr>

<tr>
<td>Submission Date</td>
<td><input type="date" id="submission_date"></td>

<td>Team / Zone</td>
<td><input type="text" id="zone" value="ZONE_1 Assembly"></td>

<td>Dept.</td>
<td><input type="text" id="dept" value="Assembly"></td>

<td>Horizontal Deployment</td>
<td>
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td>Zone Leader</td>
<td><input type="text" id="zone_leader"></td>

<td>Sub-Zone Leader</td>
<td><input type="text" id="sub_zone_leader"></td>

<td>Employee Name</td>
<td><input type="text" id="employee_name"></td>

<td>Employee Code</td>
<td><input type="text" id="employee_code"></td>
</tr>

<tr>
<td>Start Date</td>
<td><input type="date" id="start_date"></td>

<td>Completion Date</td>
<td><input type="date" id="end_date"></td>

<td>Budget Required</td>
<td colspan="3"><input type="text" id="budget"></td>
</tr>

<tr>
<td colspan="8" class="blue-header">Evaluation</td>
</tr>

<tr>
<td>Score 1</td>
<td><input type="number" id="score1"></td>

<td>Score 2</td>
<td><input type="number" id="score2"></td>

<td>Score 3</td>
<td><input type="number" id="score3"></td>

<td>Score 4</td>
<td><input type="number" id="score4"></td>
</tr>

</table>

<button type="submit">Submit</button>

</form>

<script>
async function submitForm(event) {
    event.preventDefault();

    const data = {
        submission_date: document.getElementById("submission_date").value,
        zone: document.getElementById("zone").value,
        dept: document.getElementById("dept").value,
        zone_leader: document.getElementById("zone_leader").value,
        sub_zone_leader: document.getElementById("sub_zone_leader").value,
        employee_name: document.getElementById("employee_name").value,
        employee_code: document.getElementById("employee_code").value,
        start_date: document.getElementById("start_date").value,
        end_date: document.getElementById("end_date").value,
        budget: document.getElementById("budget").value,
        score1: parseInt(document.getElementById("score1").value) || 0,
        score2: parseInt(document.getElementById("score2").value) || 0,
        score3: parseInt(document.getElementById("score3").value) || 0,
        score4: parseInt(document.getElementById("score4").value) || 0
    };

    try {
        await fetch("https://default8402d370fd9c474580dbbf24428092.b6.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/1ab494ea288f4a9a8ee802ba28dd20b3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Ss_S2beyrglq52U_6fBvctFNG6nNs2fSF1DxKyfpCU0", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        alert("Submitted successfully!");
    } catch (error) {
        alert("Error submitting form");
        console.error(error);
    }
}
</script>

</body>
</html>
